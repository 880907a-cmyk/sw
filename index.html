<html class="staticrypt-html">
    <head>
        <meta charset="utf-8" />
        <title>Protected Page</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <meta http-equiv="cache-control" content="max-age=0" />
        <meta http-equiv="cache-control" content="no-cache" />
        <meta http-equiv="expires" content="0" />

        <meta http-equiv="pragma" content="no-cache" />

        <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
        <style>
            :root {
                --accent: #1d6fe8;
                --accent-hover: #1558c0;
                --bg-primary: #0a1018;
                --bg-card: rgba(255,255,255,0.03);
                --border: rgba(255,255,255,0.06);
                --text-primary: #d0dde8;
                --text-muted: #4e6878;
                --input-bg: rgba(255,255,255,0.05);
                --input-border: rgba(255,255,255,0.1);
                --ease: cubic-bezier(0.4, 0, 0.2, 1);
            }

            .staticrypt-hr {
                margin-top: 20px;
                margin-bottom: 24px;
                border: 0;
                border-top: 1px solid rgba(255,255,255,0.06);
            }

            .staticrypt-page {
                width: 400px;
                max-width: 90vw;
                padding: 0;
                margin: auto;
                box-sizing: border-box;
            }

            .staticrypt-form {
                position: relative;
                z-index: 1;
                background: var(--bg-card);
                border: 1px solid var(--border);
                max-width: 400px;
                margin: 0 auto;
                padding: 48px 40px;
                text-align: center;
                border-radius: 20px;
                backdrop-filter: blur(20px);
                box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            }

            .staticrypt-form input[type="password"],
            .staticrypt-form input[type="text"] {
                background: transparent;
                border: 0;
                box-sizing: border-box;
                font-family: 'Noto Sans KR', sans-serif;
                font-size: 14px;
                font-weight: 400;
                color: var(--text-primary);
                outline: 0;
                padding: 14px 40px 14px 16px;
                width: 100%;
            }

            .staticrypt-form input::placeholder {
                color: #4a5a6a;
            }

            .staticrypt-password-container {
                position: relative;
                outline: 0;
                background: var(--input-bg);
                border: 1.5px solid var(--input-border);
                border-radius: 12px;
                width: 100%;
                margin: 0 0 16px;
                box-sizing: border-box;
                transition: border-color 0.25s var(--ease), box-shadow 0.25s var(--ease);
            }

            .staticrypt-password-container:focus-within {
                border-color: rgba(29,111,232,0.5);
                box-shadow: 0 0 0 3px rgba(29,111,232,0.1);
            }

            .staticrypt-toggle-password-visibility {
                cursor: pointer;
                height: 18px;
                opacity: 50%;
                padding: 14px;
                position: absolute;
                right: 0;
                top: 50%;
                transform: translateY(-50%);
                width: 18px;
                filter: invert(1);
                transition: opacity 0.2s;
            }

            .staticrypt-toggle-password-visibility:hover {
                opacity: 80%;
            }

            .staticrypt-form .staticrypt-decrypt-button {
                outline: 0;
                background: linear-gradient(135deg, var(--accent), #4da0ff);
                width: 100%;
                border: 0;
                padding: 14px;
                color: #ffffff;
                font-family: 'Noto Sans KR', sans-serif;
                font-size: 14px;
                font-weight: 600;
                letter-spacing: 0.5px;
                cursor: pointer;
                border-radius: 12px;
                transition: all 0.25s var(--ease);
                box-shadow: 0 4px 20px rgba(29,111,232,0.3);
            }

            .staticrypt-form .staticrypt-decrypt-button:hover,
            .staticrypt-form .staticrypt-decrypt-button:active,
            .staticrypt-form .staticrypt-decrypt-button:focus {
                background: linear-gradient(135deg, var(--accent-hover), #3d8ee8);
                transform: translateY(-1px);
                box-shadow: 0 6px 28px rgba(29,111,232,0.4);
            }

            .staticrypt-form .staticrypt-decrypt-button:active {
                transform: translateY(0);
            }

            .staticrypt-html {
                height: 100%;
            }

            .staticrypt-body {
                height: 100%;
                margin: 0;
            }

            .staticrypt-content {
                height: 100%;
                margin-bottom: 0;
                background: linear-gradient(160deg, #080e16 0%, #0f1d2e 40%, #0a1420 100%);
                font-family: 'Noto Sans KR', sans-serif;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
                display: flex;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                position: relative;
                overflow: hidden;
            }

            /* Ambient glow */
            .staticrypt-content::before {
                content: '';
                position: absolute;
                width: 500px;
                height: 500px;
                background: radial-gradient(circle, rgba(29,111,232,0.06) 0%, transparent 70%);
                border-radius: 50%;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                pointer-events: none;
            }

            .staticrypt-instructions {
                margin-top: 0;
                margin-bottom: 1.2em;
            }

            .staticrypt-title {
                font-family: 'Outfit', sans-serif;
                font-size: 1.4em;
                font-weight: 600;
                color: var(--text-primary);
                letter-spacing: -0.3px;
            }

            .staticrypt-instructions p:last-child {
                font-size: 13px;
                color: var(--text-muted);
                margin-top: 6px;
            }

            /* Logo */
            .lock-logo {
                width: 64px;
                height: 64px;
                background: linear-gradient(135deg, var(--accent), #4da0ff);
                border-radius: 18px;
                display: flex;
                align-items: center;
                justify-content: center;
                margin: 0 auto 20px;
                box-shadow: 0 10px 50px rgba(29,111,232,0.25);
                animation: float 4s ease-in-out infinite;
            }

            .lock-logo span {
                font-family: 'Outfit', sans-serif;
                font-weight: 700;
                font-size: 22px;
                color: #fff;
                letter-spacing: -1px;
            }

            @keyframes float {
                0%, 100% { transform: translateY(0); }
                50% { transform: translateY(-6px); }
            }

            label.staticrypt-remember {
                display: flex;
                align-items: center;
                margin-bottom: 1em;
                font-size: 13px;
                color: var(--text-muted);
                cursor: pointer;
            }

            .staticrypt-remember input[type="checkbox"] {
                transform: scale(1.3);
                margin-right: 0.8em;
                accent-color: var(--accent);
            }

            .hidden {
                display: none !important;
            }

            .staticrypt-spinner-container {
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                background: linear-gradient(160deg, #080e16 0%, #0f1d2e 40%, #0a1420 100%);
            }

            .staticrypt-spinner {
                display: inline-block;
                width: 2rem;
                height: 2rem;
                vertical-align: text-bottom;
                border: 0.25em solid rgba(29,111,232,0.2);
                border-top-color: var(--accent);
                border-radius: 50%;
                animation: spinner-border 0.75s linear infinite;
            }

            @keyframes spinner-border {
                100% {
                    transform: rotate(360deg);
                }
            }

            /* Footer */
            .staticrypt-footer {
                position: absolute;
                bottom: 24px;
                left: 50%;
                transform: translateX(-50%);
                font-size: 10px;
                color: #3a4a5a;
                text-align: center;
                line-height: 1.6;
            }

            @media screen and (-webkit-min-device-pixel-ratio: 0) {
                .staticrypt-form input[type="password"],
                .staticrypt-form input[type="text"] {
                    font-size: 16px;
                }
            }

            @media (max-width: 480px) {
                .staticrypt-form {
                    padding: 36px 28px;
                    border-radius: 16px;
                }
                .lock-logo {
                    width: 56px;
                    height: 56px;
                    border-radius: 16px;
                }
                .lock-logo span {
                    font-size: 19px;
                }
            }
        </style>
    </head>
