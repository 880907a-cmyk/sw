<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SW Healthcare Portal</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%231d6fe8'/><text x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-family='Arial' font-weight='bold' font-size='28' fill='white'>SW</text></svg>" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --sidebar-collapsed: 48px;
    --sidebar-expanded: 264px;
    --sidebar-bg: #0f1923;
    --sidebar-hover: #1a2a3a;
    --accent: #1d6fe8;
    --accent-glow: rgba(29, 111, 232, 0.12);
    --text-muted: #607080;
    --text-light: #8899aa;
    --text-active: #ffffff;
    --ease: cubic-bezier(0.4, 0, 0.2, 1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; font-family: 'Noto Sans KR', sans-serif; background: #0a1018; }

  /* ═══════════════════ SIDEBAR ═══════════════════ */
  .sidebar {
    position: fixed;
    left: 0; top: 0;
    width: var(--sidebar-collapsed);
    height: 100vh;
    background: var(--sidebar-bg);
    z-index: 1000;
    transition: width 0.32s var(--ease);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    border-right: 1px solid rgba(255,255,255,0.05);
  }
  .sidebar:hover {
    width: var(--sidebar-expanded);
    box-shadow: 6px 0 40px rgba(0,0,0,0.55);
  }

  /* ── Hamburger ── */
  .sidebar-trigger {
    width: var(--sidebar-collapsed);
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    cursor: pointer;
  }
  .hamburger {
    display: flex;
    flex-direction: column;
    gap: 4.5px;
    width: 19px;
  }
  .hamburger span {
    height: 2px;
    width: 100%;
    background: #4e6070;
    border-radius: 2px;
    transition: all 0.3s var(--ease);
  }
  .sidebar:hover .hamburger span { background: var(--accent); }
  .sidebar:hover .hamburger span:nth-child(1) { width: 60%; }
  .sidebar:hover .hamburger span:nth-child(3) { width: 75%; }

  /* ── Brand ── */
  .sidebar-brand {
    height: 0; opacity: 0; overflow: hidden;
    padding: 0 20px;
    transition: all 0.32s var(--ease);
    white-space: nowrap;
  }
  .sidebar:hover .sidebar-brand {
    height: 56px; opacity: 1;
    display: flex; align-items: center; gap: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    margin-bottom: 12px;
  }
  .brand-icon {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--accent), #4da0ff);
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Outfit', sans-serif;
    font-weight: 700; font-size: 12px; color: #fff;
    flex-shrink: 0;
    letter-spacing: -0.5px;
  }
  .brand-text {
    font-family: 'Outfit', sans-serif;
    font-size: 15px; font-weight: 600; color: #d0dde8;
    letter-spacing: -0.3px;
  }
  .brand-sub {
    font-size: 9.5px; color: #4e6070; font-weight: 400; margin-top: 1px;
  }

  /* ── Section label ── */
  .nav-section {
    padding: 6px 20px 6px;
    font-size: 9.5px;
    font-weight: 600;
    color: #3a4a5a;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    opacity: 0;
    transition: opacity 0.32s var(--ease);
    white-space: nowrap;
  }
  .sidebar:hover .nav-section { opacity: 1; }

  /* ── Nav items ── */
  .sidebar-nav {
    flex: 1;
    padding: 0 8px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .nav-item {
    display: flex;
    align-items: center;
    height: 44px;
    padding: 0 12px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.25s var(--ease);
    white-space: nowrap;
    gap: 14px;
    color: var(--text-light);
    text-decoration: none;
    position: relative;
  }
  .nav-item:hover { background: var(--sidebar-hover); color: #bccee0; }
  .nav-item.active {
    background: var(--accent-glow);
    color: var(--text-active);
  }
  .nav-item.active::before {
    content: '';
    position: absolute;
    left: 0; top: 9px; bottom: 9px;
    width: 3px;
    background: var(--accent);
    border-radius: 0 4px 4px 0;
  }

  .nav-icon {
    width: 24px; height: 24px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .nav-icon svg {
    width: 18px; height: 18px;
    stroke: currentColor; fill: none;
    stroke-width: 1.7;
    stroke-linecap: round; stroke-linejoin: round;
    transition: all 0.25s var(--ease);
  }
  .nav-item.active .nav-icon svg {
    stroke: var(--accent);
    filter: drop-shadow(0 0 5px rgba(29,111,232,0.5));
  }

  .nav-label {
    font-size: 13px; font-weight: 500;
    opacity: 0; transform: translateX(-8px);
    transition: all 0.3s var(--ease);
    pointer-events: none;
  }
  .sidebar:hover .nav-label {
    opacity: 1; transform: translateX(0);
  }

  /* Collapsed tooltip */
  .nav-item[data-tooltip]::after {
    content: attr(data-tooltip);
    position: absolute;
    left: 56px; top: 50%;
    transform: translateY(-50%) scale(0.92);
    background: #1e2e3e;
    color: #c0d0e0;
    font-size: 12px; font-weight: 500;
    padding: 5px 11px;
    border-radius: 7px;
    white-space: nowrap;
    opacity: 0; pointer-events: none;
    transition: all 0.2s var(--ease);
    box-shadow: 0 4px 16px rgba(0,0,0,0.35);
    z-index: 2000;
  }
  .nav-item:hover::after {
    opacity: 1; transform: translateY(-50%) scale(1);
  }
  .sidebar:hover .nav-item::after {
    opacity: 0 !important; display: none;
  }

  /* ── Collapsed active pip ── */
  .collapsed-pip {
    position: absolute;
    left: 0; width: 3px; height: 18px;
    background: var(--accent);
    border-radius: 0 4px 4px 0;
    transition: top 0.35s var(--ease), opacity 0.2s;
    pointer-events: none;
    opacity: 0;
  }
  .sidebar:hover .collapsed-pip { opacity: 0; }

  /* ── Footer ── */
  .sidebar-footer {
    padding: 14px 8px;
    border-top: 1px solid rgba(255,255,255,0.05);
    opacity: 0;
    transition: opacity 0.3s var(--ease);
  }
  .sidebar:hover .sidebar-footer { opacity: 1; }
  .sidebar-footer-text {
    font-size: 10px; color: #3a4a5a;
    text-align: center; line-height: 1.6;
  }

  /* ═══════════════════ CONTENT ═══════════════════ */
  .content {
    margin-left: var(--sidebar-collapsed);
    height: 100vh;
    position: relative;
    background: #f4f6f9;
  }
  .content iframe {
    width: 100%; height: 100%;
    border: none; display: block;
  }

  /* Loading */
  .loading-overlay {
    position: absolute; inset: 0;
    background: #0f1923;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 20px; z-index: 10;
    transition: opacity 0.5s ease;
  }
  .loading-overlay.hidden { opacity: 0; pointer-events: none; }

  .loader {
    width: 40px; height: 40px; position: relative;
  }
  .loader::before, .loader::after {
    content: '';
    position: absolute; inset: 0;
    border: 3px solid transparent;
    border-radius: 50%;
  }
  .loader::before {
    border-top-color: var(--accent);
    animation: spin 0.8s linear infinite;
  }
  .loader::after {
    border-bottom-color: rgba(29,111,232,0.3);
    animation: spin 1.2s linear infinite reverse;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-size: 13px; color: #4e6070; font-weight: 400;
    letter-spacing: 0.3px;
  }

  /* ═══════════════════ WELCOME ═══════════════════ */
  .welcome {
    position: absolute; inset: 0;
    background: linear-gradient(160deg, #0f1923 0%, #162236 50%, #0f1923 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 10px; z-index: 5;
    transition: opacity 0.5s ease;
  }
  .welcome.hidden { opacity: 0; pointer-events: none; }

  .welcome-icon {
    width: 68px; height: 68px;
    background: linear-gradient(135deg, var(--accent), #4da0ff);
    border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 14px;
    box-shadow: 0 10px 50px rgba(29,111,232,0.25);
    animation: float 4s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
  .welcome-icon span {
    font-family: 'Outfit', sans-serif;
    font-weight: 700; font-size: 24px; color: #fff;
    letter-spacing: -1px;
  }

  .welcome h1 {
    font-family: 'Outfit', sans-serif;
    font-size: 28px; font-weight: 700;
    color: #d0dde8;
    letter-spacing: -0.5px;
  }
  .welcome p {
    font-size: 14px; color: #4e6878;
    font-weight: 400; margin-top: 2px;
  }

  .welcome-cards {
    display: flex; gap: 16px;
    margin-top: 40px;
  }
  .welcome-card {
    width: 185px;
    padding: 24px 18px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px;
    cursor: pointer;
    transition: all 0.3s var(--ease);
    text-align: center;
  }
  .welcome-card:hover {
    background: rgba(29,111,232,0.08);
    border-color: rgba(29,111,232,0.25);
    transform: translateY(-5px);
    box-shadow: 0 16px 40px rgba(0,0,0,0.35);
  }
  .welcome-card .wc-icon {
    width: 42px; height: 42px;
    margin: 0 auto 14px;
    background: rgba(29,111,232,0.1);
    border-radius: 11px;
    display: flex; align-items: center; justify-content: center;
  }
  .welcome-card .wc-icon svg {
    width: 20px; height: 20px;
    stroke: var(--accent); fill: none;
    stroke-width: 1.7;
    stroke-linecap: round; stroke-linejoin: round;
  }
  .welcome-card .wc-title {
    font-size: 14px; font-weight: 600; color: #c0d0e0;
    margin-bottom: 6px;
  }
  .welcome-card .wc-desc {
    font-size: 11px; color: #4e6070; line-height: 1.6;
  }

  /* ═══════════════════ LOCK SCREEN ═══════════════════ */
  .lock-screen {
    position: fixed; inset: 0;
    background: linear-gradient(160deg, #080e16 0%, #0f1d2e 40%, #0a1420 100%);
    z-index: 9999;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 0;
    transition: opacity 0.6s ease, transform 0.6s ease;
  }
  .lock-screen.unlocked {
    opacity: 0;
    transform: scale(1.05);
    pointer-events: none;
  }

  /* Ambient glow */
  .lock-screen::before {
    content: '';
    position: absolute;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(29,111,232,0.08) 0%, transparent 70%);
    border-radius: 50%;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }

  .lock-logo {
    width: 72px; height: 72px;
    background: linear-gradient(135deg, var(--accent), #4da0ff);
    border-radius: 22px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 24px;
    box-shadow: 0 12px 60px rgba(29,111,232,0.3);
    animation: float 4s ease-in-out infinite;
    position: relative;
  }
  .lock-logo span {
    font-family: 'Outfit', sans-serif;
    font-weight: 700; font-size: 26px; color: #fff;
    letter-spacing: -1px;
  }

  .lock-title {
    font-family: 'Outfit', sans-serif;
    font-size: 22px; font-weight: 600;
    color: #c0d0e0;
    margin-bottom: 6px;
    letter-spacing: -0.3px;
  }
  .lock-subtitle {
    font-size: 13px; color: #4a5a6a;
    margin-bottom: 36px;
  }

  .pin-container {
    display: flex;
    gap: 14px;
    margin-bottom: 20px;
    position: relative;
  }
  .pin-dot {
    width: 48px; height: 56px;
    background: rgba(255,255,255,0.04);
    border: 1.5px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Outfit', sans-serif;
    font-size: 24px; font-weight: 600;
    color: #d0dde8;
    transition: all 0.25s var(--ease);
  }
  .pin-dot.filled {
    border-color: rgba(29,111,232,0.4);
    background: rgba(29,111,232,0.08);
    box-shadow: 0 0 20px rgba(29,111,232,0.1);
  }
  .pin-dot.error {
    border-color: #e03030;
    background: rgba(224,48,48,0.08);
    animation: shake 0.5s ease;
  }
  .pin-dot.success {
    border-color: #0a9e6e;
    background: rgba(10,158,110,0.1);
    box-shadow: 0 0 20px rgba(10,158,110,0.15);
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-6px); }
    80% { transform: translateX(6px); }
  }

  .pin-hidden-input {
    position: absolute;
    opacity: 0;
    width: 0; height: 0;
    pointer-events: none;
  }

  .lock-hint {
    font-size: 12px; color: #3a4a5a;
    height: 18px;
    transition: all 0.3s;
  }
  .lock-hint.error { color: #e03030; }

  /* Numpad */
  .numpad {
    display: grid;
    grid-template-columns: repeat(3, 64px);
    gap: 12px;
    margin-top: 28px;
  }
  .numpad-btn {
    width: 64px; height: 54px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px;
    color: #b0c0d0;
    font-family: 'Outfit', sans-serif;
    font-size: 20px; font-weight: 500;
    cursor: pointer;
    transition: all 0.2s var(--ease);
    display: flex; align-items: center; justify-content: center;
  }
  .numpad-btn:hover {
    background: rgba(29,111,232,0.1);
    border-color: rgba(29,111,232,0.2);
    color: #fff;
    transform: scale(1.04);
  }
  .numpad-btn:active {
    transform: scale(0.96);
    background: rgba(29,111,232,0.2);
  }
  .numpad-btn.empty {
    visibility: hidden;
  }
  .numpad-btn.backspace {
    font-size: 18px;
  }
  .numpad-btn.backspace svg {
    width: 22px; height: 22px;
    stroke: currentColor; fill: none;
    stroke-width: 1.7;
    stroke-linecap: round; stroke-linejoin: round;
  }

  /* Hide sidebar & content when locked */
  .app-locked .sidebar,
  .app-locked .content {
    opacity: 0;
    pointer-events: none;
  }
</style>
</head>
<body class="app-locked">

<!-- ═══ LOCK SCREEN ═══ -->
<div class="lock-screen" id="lockScreen">
  <div class="lock-logo"><span>SW</span></div>
  <div class="lock-title">SW Healthcare Portal</div>
  <div class="lock-subtitle">비밀번호를 입력하세요</div>

  <div class="pin-container" id="pinContainer" onclick="document.getElementById('pinInput').focus()">
    <div class="pin-dot" id="dot0"></div>
    <div class="pin-dot" id="dot1"></div>
    <div class="pin-dot" id="dot2"></div>
    <div class="pin-dot" id="dot3"></div>
    <input class="pin-hidden-input" id="pinInput" type="tel" maxlength="4" inputmode="numeric" autofocus autocomplete="off">

  <div class="lock-hint" id="lockHint"></div>

  <div class="numpad" id="numpad">
    <button class="numpad-btn" data-num="1">1</button>

    <button class="numpad-btn" data-num="4">4</button>
    <button class="numpad-btn" data-num="5">5</button>
    <button class="numpad-btn" data-num="6">6</button>
    <button class="numpad-btn" data-num="7">7</button>
    <button class="numpad-btn" data-num="8">8</button>
    <button class="numpad-btn" data-num="9">9</button>

    </button>

</div>

<!-- ═══ SIDEBAR ═══ -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-trigger">
    <div class="hamburger"><span></span><span></span><span></span></div>
  </div>

  <div class="sidebar-brand">
    <div class="brand-icon">SW</div>

      <div class="brand-text">SW Healthcare</div>

    </div>

  <div class="nav-section">Pages</div>

  <nav class="sidebar-nav">
    <div class="nav-item" data-page="dashboard.html" data-tooltip="경영지표" data-idx="0" onclick="navigate(this)">
      <div class="nav-icon">
        <svg viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="M7 16l4-4 4 4 5-8"/></svg>
      </div>
      <span class="nav-label">경영지표</span>
    </div>

    <div class="nav-item" data-page="pcare.html" data-tooltip="맞춤형건기식 통계" data-idx="1" onclick="navigate(this)">
      <div class="nav-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      </div>
      <span class="nav-label">맞춤형건기식 통계</span>
    </div>

    <div class="nav-item" data-page="work.html" data-tooltip="일정" data-idx="2" onclick="navigate(this)">
      <div class="nav-icon">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/><path d="M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01"/></svg>

  <!-- Welcome -->
  <div class="welcome" id="welcome">

    <h1>SW Healthcare Portal</h1>
    <p>좌측 메뉴에서 페이지를 선택하세요</p>

      <div class="welcome-card" onclick="navigateByPage('pcare.html')">
        <div class="wc-icon">
          <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>

      <div class="welcome-card" onclick="navigateByPage('work.html')">
        <div class="wc-icon">
          <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        </div>
        <div class="wc-title">일정</div>

      </div>
    </div>
  </div>

  <!-- Loading -->
  <div class="loading-overlay hidden" id="loader">
    <div class="loader"></div>
    <div class="loading-text">페이지를 불러오는 중...</div>
  </div>

  <!-- Page iframe -->
  <iframe id="pageFrame" style="display:none;"></iframe>
</main>

<script>
  // ═══ LOCK SCREEN ═══
  const PIN = '3907';
  let entered = '';
  const lockScreen = document.getElementById('lockScreen');
  const lockHint   = document.getElementById('lockHint');
  const dots       = [0,1,2,3].map(i => document.getElementById('dot' + i));

  function updateDots() {
    dots.forEach((d, i) => {
      d.textContent = i < entered.length ? '●' : '';
      d.classList.toggle('filled', i < entered.length);
      d.classList.remove('error', 'success');
    });
  }

  function addDigit(num) {
    if (entered.length >= 4) return;
    entered += num;
    updateDots();
    if (entered.length === 4) {
      setTimeout(checkPin, 200);
    }
  }

  function removeDigit() {
    if (entered.length === 0) return;
    entered = entered.slice(0, -1);
    updateDots();
    lockHint.textContent = '';
    lockHint.classList.remove('error');
  }

  function checkPin() {
    if (entered === PIN) {
      dots.forEach(d => d.classList.add('success'));
      lockHint.textContent = '';
      setTimeout(() => {
        lockScreen.classList.add('unlocked');
        document.body.classList.remove('app-locked');
        sessionStorage.setItem('sw_auth', '1');
      }, 400);
    } else {
      dots.forEach(d => d.classList.add('error'));
      lockHint.textContent = '비밀번호가 올바르지 않습니다';
      lockHint.classList.add('error');
      setTimeout(() => {
        entered = '';
        updateDots();
      }, 600);
    }
  }

  // Numpad clicks
  document.getElementById('numpad').addEventListener('click', (e) => {
    const btn = e.target.closest('.numpad-btn');
    if (!btn) return;
    const num = btn.dataset.num;
    if (num === 'back') removeDigit();
    else if (num) addDigit(num);
  });

  // Keyboard input
  document.addEventListener('keydown', (e) => {
    if (lockScreen.classList.contains('unlocked')) return;
    if (e.key >= '0' && e.key <= '9') addDigit(e.key);
    else if (e.key === 'Backspace') removeDigit();
  });

  // Session persistence — skip lock if already authenticated this session
  if (sessionStorage.getItem('sw_auth') === '1') {
    lockScreen.classList.add('unlocked');
    document.body.classList.remove('app-locked');
  }
</script>

<script>
  const frame     = document.getElementById('pageFrame');
  const loader    = document.getElementById('loader');
  const welcome   = document.getElementById('welcome');
  const pip       = document.getElementById('pip');
  const navItems  = document.querySelectorAll('.sidebar-nav .nav-item');

  function updatePip(idx) {
    pip.style.top = (70 + idx * 46 + 13) + 'px';
    pip.style.opacity = '1';
  }

  function navigate(el) {
    const page = el.dataset.page;
    const idx  = parseInt(el.dataset.idx);

    navItems.forEach(n => n.classList.remove('active'));
    el.classList.add('active');
    updatePip(idx);

    welcome.classList.add('hidden');
    loader.classList.remove('hidden');
    frame.style.display = 'block';
    frame.src = page + '?v=' + Date.now();
  }

  function navigateByPage(page) {
    const el = document.querySelector(`.nav-item[data-page="${page}"]`);
    if (el) navigate(el);
  }

  frame.addEventListener('load', () => {
    setTimeout(() => loader.classList.add('hidden'), 250);
  });
</script>

</body>
</html>
